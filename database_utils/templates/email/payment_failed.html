{% extends "base_layout.html" %}
{% block content %}

<p>We were unable to process your subscription payment. Please add or update a payment method to avoid service interruption.</p>
<table>

  <tr><td>Amount due:</td><td>{{ total_formatted }}</td></tr>
</table>
{% endblock %}
